services:
    quenary:
        image: "ghcr.io/quenary/tugtainer-agent:1"
        volumes:
            - "/var/run/docker.sock:/var/run/docker.sock:ro"
        environment:
            - AGENT_SECRET=
        restart: unless-stopped
        container_name: tugtainer-agent
        ports:
            - "9413:8001"
