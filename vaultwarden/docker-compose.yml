services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      DOMAIN: "https://vault.raffaele-terracciano.it"
    volumes:
      - ./data/:/data/
    ports:
      - 8007:80
    labels:
      homepage.group: Utili
      homepage.name: Vaultwarden
      homepage.icon: vaultwarden
      homepage.href: http://10.0.0.51:8007